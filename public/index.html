<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Onboarding</title>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <style>
      :root {
        --success: #2ecc71;
        --error: #e74c3c;
        --primary: #5a297e;
        --bg: #0f0f0f;
        --card: #1a1a1a;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: white;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }
      .form-container {
        background: var(--card);
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 650px;
        border: 1px solid #333;
      }
      h2 {
        margin-bottom: 25px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .field {
        margin-bottom: 20px;
        position: relative;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        color: #888;
        text-transform: uppercase;
        font-weight: 600;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        background: #252525;
        border: 2px solid #333;
        border-radius: 6px;
        color: white;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
      }
      input:focus,
      select:focus {
        border-color: var(--primary);
      }

      /* --- JustValidate Styling --- */
      .just-validate-error-field {
        border-color: var(--error) !important;
      }
      .just-validate-success-field {
        border-color: var(--success) !important;
      }
      .just-validate-error-label {
        color: var(--error) !important;
        font-size: 11px;
        margin-top: 5px;
        display: block;
        font-weight: 500;
      }

      .row {
        display: flex;
        gap: 15px;
      }
      .row .field {
        flex: 1;
      }
      button {
        width: 100%;
        padding: 15px;
        background: var(--primary);
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        text-transform: uppercase;
      }
      .success-banner {
        display: none;
        background: rgba(46, 204, 113, 0.2);
        color: var(--success);
        padding: 15px;
        border-radius: 6px;
        text-align: center;
        margin-bottom: 20px;
        border: 1px solid var(--success);
      }
      select:disabled {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <div id="successBanner" class="success-banner">
        Registration Successful!
      </div>
      <h2>Business Registration</h2>

      <form id="bizForm" autocomplete="off">
        <div class="field">
          <label>Full Name</label>
          <input
            type="text"
            name="full_name"
            id="full_name"
            placeholder="Enter name"
          />
        </div>

        <div class="field">
          <label>Company Name</label>
          <input
            type="text"
            name="company_name"
            id="company_name"
            placeholder="Legal entity name"
          />
        </div>

        <div class="row">
          <div class="field">
            <label>Company PAN</label>
            <input
              type="text"
              name="company_pan"
              id="company_pan"
              maxlength="10"
              placeholder="ABCDE1234F"
              style="text-transform: uppercase"
            />
          </div>
          <div class="field">
            <label>GST Number</label>
            <input
              type="text"
              name="gst_no"
              id="gst_no"
              maxlength="15"
              placeholder="22AAAAA0000A1Z5"
              style="text-transform: uppercase"
            />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Mobile Number</label>
            <input
              type="tel"
              name="mobile_no"
              id="mobile_no"
              maxlength="10"
              placeholder="9876543210"
            />
          </div>
          <div class="field">
            <label>Email Address</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="email@business.com"
            />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>State</label>
            <select name="state" id="stateSelect">
              <option value="">Loading...</option>
            </select>
          </div>
          <div class="field">
            <label>City</label>
            <select name="city" id="citySelect" disabled>
              <option value="">Select State</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Annual Turnover</label>
          <select name="turnover" id="turnover" class="has-other">
            <option value="">Select Range</option>
            <option value="0-20L">₹0 - ₹20 Lakhs</option>
            <option value="20L-1Cr">₹20 Lakhs - ₹1 Crore</option>
            <option value="1Cr-5Cr">₹1 Crore - ₹5 Crores</option>
            <option value="5Cr-20Cr">₹5 Crores - ₹20 Crores</option>
            <option value="20Cr+">Above ₹20 Crores</option>
            <option value="Other">Other</option>
          </select>
          <input
            type="text"
            name="turnover_other"
            id="turnover_other"
            style="display: none; margin-top: 10px"
            placeholder="Specify Turnover"
          />
        </div>

        <div class="field">
          <label>Buyer Type</label>
          <select name="buyer_type" id="buyer_type" class="has-other">
            <option value="">Select Category</option>
            <option value="Retailer">Retailer</option>
            <option value="Wholesaler">Wholesaler</option>
            <option value="Distributor">Distributor</option>
            <option value="Manufacturer">Manufacturer</option>
            <option value="Individual">Individual</option>
            <option value="Other">Other</option>
          </select>
          <input
            type="text"
            name="buyer_type_other"
            id="buyer_type_other"
            style="display: none; margin-top: 10px"
            placeholder="Specify Buyer Type"
          />
        </div>

        <button type="submit">Submit Details</button>
      </form>
    </div>

    <script>
      // 1. Initialize Validator with full config
      const validator = new JustValidate("#bizForm", {
        errorFieldCssClass: "just-validate-error-field",
        successFieldCssClass: "just-validate-success-field",
        errorLabelCssClass: "just-validate-error-label",
        validateBeforeSubmitting: true,
      });

      // 2. Fetch All States and Cities
      const stateSelect = document.getElementById("stateSelect");
      const citySelect = document.getElementById("citySelect");

      async function initLocation() {
        try {
          const res = await fetch(
            "https://raw.githubusercontent.com/sab99r/Indian-States-And-Districts/master/states-and-districts.json",
          );
          const data = await res.json();
          stateSelect.innerHTML = '<option value="">Select State</option>';
          data.states.forEach((s) => {
            let opt = document.createElement("option");
            opt.value = s.state;
            opt.innerHTML = s.state;
            stateSelect.appendChild(opt);
          });
          stateSelect.onchange = () => {
            const state = data.states.find(
              (x) => x.state === stateSelect.value,
            );
            citySelect.innerHTML = '<option value="">Select City</option>';
            if (state) {
              state.districts.sort().forEach((c) => {
                let opt = document.createElement("option");
                opt.value = c;
                opt.innerHTML = c;
                citySelect.appendChild(opt);
              });
              citySelect.disabled = false;
            } else {
              citySelect.disabled = true;
            }
          };
        } catch (e) {
          stateSelect.innerHTML = "<option>Error</option>";
        }
      }

      // 3. Accurate Validation Rules
      validator
        .addField("#full_name", [
          { rule: "required", errorMessage: "Name is required" },
          { rule: "minLength", value: 3 },
        ])
        .addField("#company_name", [
          { rule: "required", errorMessage: "Company name required" },
        ])
        .addField("#company_pan", [
          { rule: "required", errorMessage: "PAN is required" },
          {
            rule: "customRegexp",
            value: /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/,
            errorMessage: "Invalid PAN format (e.g. ABCDE1234F)",
          },
        ])
        .addField("#gst_no", [
          { rule: "required", errorMessage: "GST is required" },
          {
            rule: "customRegexp",
            value: /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/,
            errorMessage: "Invalid GST format",
          },
        ])
        .addField("#mobile_no", [
          { rule: "required", errorMessage: "Mobile is required" },
          {
            rule: "customRegexp",
            value: /^[6-9]\d{9}$/,
            errorMessage: "Invalid 10-digit number",
          },
        ])
        .addField("#email", [
          { rule: "required", errorMessage: "Email is required" },
          { rule: "email", errorMessage: "Email is invalid" },
        ])
        .addField("#stateSelect", [
          { rule: "required", errorMessage: "Select a state" },
        ])
        .addField("#citySelect", [
          { rule: "required", errorMessage: "Select a city" },
        ])
        .addField("#turnover", [
          { rule: "required", errorMessage: "Select turnover" },
        ])
        .addField("#buyer_type", [
          { rule: "required", errorMessage: "Select buyer type" },
        ]);

      // 4. "Other" Toggle
      document.querySelectorAll(".has-other").forEach((sel) => {
        sel.onchange = () => {
          const other = sel.parentElement.querySelector('input[type="text"]');
          if (sel.value === "Other") {
            other.style.display = "block";
            validator.addField(`#${other.id}`, [
              { rule: "required", errorMessage: "Field is required" },
            ]);
          } else {
            other.style.display = "none";
            validator.removeField(`#${other.id}`);
          }
        };
      });

      const handleOtherValidation = (selectId, otherInputId, errorMsg) => {
        const selectEl = document.getElementById(selectId);
        const otherInput = document.getElementById(otherInputId);

        selectEl.addEventListener("change", function () {
          if (this.value === "Other") {
            otherInput.style.display = "block";

            // Add validation rule dynamically
            validator.addField(`#${otherInputId}`, [
              {
                rule: "required",
                errorMessage: errorMsg,
              },
              {
                rule: "minLength",
                value: 3,
                errorMessage: "Please be more specific",
              },
            ]);
          } else {
            otherInput.style.display = "none";
            otherInput.value = ""; // Clear value

            // Remove validation rule so it doesn't block submission
            validator.removeField(`#${otherInputId}`);
          }
        });
      };

      handleOtherValidation(
        "turnover",
        "turnover_other",
        "Please specify your turnover",
      );
      handleOtherValidation(
        "buyer_type",
        "buyer_type_other",
        "Please specify buyer type",
      );

      // 5. Submit Handler
      validator.onSuccess(async () => {
        const submitBtn = document.querySelector('button[type="submit"]');
        const formElement = document.getElementById("bizForm");

        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        const formData = new FormData(formElement);
        const data = Object.fromEntries(formData.entries());
        if (data.turnover === "Other") {
          data.turnover = data.turnover_other;
        }
        if (data.buyer_type === "Other") {
          data.buyer_type = data.buyer_type_other;
        }
        delete data.turnover_other;
        delete data.buyer_type_other;
        try {
          const response = await fetch("/submit-form", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          const result = await response.json();

          if (response.ok) {
            document.getElementById("successBanner").style.display = "block";
            formElement.reset();
            validator.refresh();

            document.getElementById("turnover_other").style.display = "none";
            document.getElementById("buyer_type_other").style.display = "none";
            document.getElementById("citySelect").disabled = true;
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Details";
            window.scrollTo({ top: 0, behavior: "smooth" });
            setTimeout(() => {
              document.getElementById("successBanner").style.display = "none";
            }, 5000);
          } else {
            // Handle the duplicate error from server
            alert(
              result.message || "Submission failed. Possible duplicate entry.",
            );
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Details";
          }
        } catch (err) {
          console.error("Submission error:", err);
        }
      });

      // Auto-uppercase
      ["company_pan", "gst_no"].forEach((id) => {
        document
          .getElementById(id)
          .addEventListener(
            "input",
            (e) => (e.target.value = e.target.value.toUpperCase()),
          );
      });

      initLocation();
    </script>
  </body>
</html>
